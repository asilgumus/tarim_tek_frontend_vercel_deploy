<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSense AI - Bulut Yönetim Portalı</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #27ae60;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(46, 204, 113, 0.05) 0%, transparent 100%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .id-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            color: #fff;
            border: 1px dashed var(--primary-color);
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--secondary-color);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        .video-wrapper {
            grid-column: span 2;
            margin-top: 2rem;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: none;
            border: 2px solid var(--primary-color);
            position: relative;
        }

        .video-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(231, 76, 60, 0.8);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .video-wrapper {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-leaf"></i> AGRISENSE</div>
            <p style="color: #94a3b8;">Bulut Üzerinden Akıllı Tarım İzleme</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Cihaz Kaydet</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">Merkezi sunucuya yeni cihaz kaydedin.</p>
                <div id="id-area" style="display: none;">
                    <div class="id-display" id="generated-id">----</div>
                    <p style="color: #f1f5f9; font-size: 0.85rem; margin-bottom: 1rem;">
                        <i class="fas fa-info-circle"></i> Cihaz yakında otomatik başlayacaktır.
                    </p>
                </div>
                <button onclick="registerDevice()" id="reg-btn">YENİ ID OLUŞTUR</button>
            </div>

            <div class="card">
                <h2><i class="fas fa-search"></i> Kamera İzle</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">LocalTunnel üzerinden cihaza bağlanın.</p>
                <input type="text" id="view-id" placeholder="Cihaz ID (Örn: 0412)" maxlength="4">
                <button onclick="startViewing()">KAMERAYI AÇ</button>
            </div>

            <div class="video-wrapper" id="video-wrapper">
                <div class="video-status"><i class="fas fa-satellite-dish"></i> CANLI YAYIN: <span
                        id="active-id-display"></span></div>
                <img id="stream-img" src="" alt="Kamera Yayını">
            </div>
        </div>
    </div>

    <!-- Hidden elements for frame capture -->
    <video id="capture-video" autoplay playsinline style="display:none;"></video>
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <!-- Socket.IO Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const BACKEND_URL = "https://tarimtekbackend.loca.lt";
        
        // Socket.IO Bağlantısını Başlat
        const socket = io(BACKEND_URL, {
            // LocalTunnel'ın uyarı ekranına takılmamak için bu header ŞART
            extraHeaders: {
                "Bypass-Tunnel-Reminder": "true"
            },
            reconnectionAttempts: 10,
            timeout: 20000
        });

        socket.on('connect', () => {
            console.log("✅ Sunucuya WebSocket ile bağlanıldı! SID:", socket.id);
        });

        socket.on('disconnect', (reason) => {
            console.warn("⚠️ WebSocket bağlantısı koptu:", reason);
        });

        socket.on('connect_error', (error) => {
            console.error("❌ WebSocket bağlantı hatası:", error);
        });

        let isStreaming = false;
        let streamDeviceId = null;
        let currentStream = null; 
        let animationFrameId = null;

        function stopExistingStream() {
            isStreaming = false; 
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        async function registerDevice() {
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.innerText = "BAĞLANILIYOR...";

            stopExistingStream();

            try {
                // Kayıt işlemi hala HTTP üzerinden (çünkü sadece 1 kere yapılıyor)
                const response = await fetch(`${BACKEND_URL}/register`);
                const data = await response.json();
                
                streamDeviceId = data.device_id;
                document.getElementById('id-area').style.display = 'block';
                document.getElementById('generated-id').innerText = streamDeviceId;
                btn.innerText = "YENİ ID OLUŞTUR";
                btn.disabled = false;

                startBrowserStreaming(streamDeviceId);
            } catch (error) {
                console.error(error);
                alert("Backend'e ulaşılamadı. Lütfen LocalTunnel'ın açık olduğundan emin olun.");
                btn.disabled = false;
                btn.innerText = "TEKRAR DENE";
            }
        }

        async function startBrowserStreaming(deviceId) {
            const video = document.getElementById('capture-video');
            const canvas = document.getElementById('capture-canvas');
            const context = canvas.getContext('2d');

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, frameRate: { ideal: 15 } } 
                });
                video.srcObject = currentStream;
                isStreaming = true;

                // Odaya Katıl (Yayıncı Olarak)
                socket.emit('join', { id: deviceId });

                let lastFrameTime = 0;
                const TARGET_FPS = 15; // WebSockets çok hızlı olduğu için 15 FPS'e çıkarabiliriz
                const frameIntervalMs = 1000 / TARGET_FPS;

                const sendFrameLoop = async (time) => {
                    if (!isStreaming) return;

                    if (time - lastFrameTime >= frameIntervalMs) {
                        lastFrameTime = time;

                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);

                        // Base64 formatında alıp doğrudan Socket.IO ile Pushla
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        socket.emit('video_frame', { id: deviceId, image: dataUrl });
                    }

                    if (isStreaming) {
                        animationFrameId = requestAnimationFrame(sendFrameLoop);
                    }
                };

                video.onloadedmetadata = () => {
                    animationFrameId = requestAnimationFrame(sendFrameLoop);
                };

            } catch (err) {
                console.error("Kamera erişim hatası:", err);
                alert("Kamera izni verilmedi veya başka bir uygulama kamerayı kullanıyor.");
                isStreaming = false;
            }
        }

        function startViewing() {
            const deviceId = document.getElementById('view-id').value.trim();
            if (deviceId.length !== 4) {
                alert("Lütfen 4 haneli geçerli bir ID girin.");
                return;
            }

            const wrapper = document.getElementById('video-wrapper');
            const streamImg = document.getElementById('stream-img');
            const activeIdDisp = document.getElementById('active-id-display');

            wrapper.style.display = 'block';
            activeIdDisp.innerText = "ID " + deviceId;
            
            // Odaya Katıl (İzleyici Olarak)
            socket.emit('join', { id: deviceId });

            // Sunucudan gelen canlı kareleri dinle
            socket.on('video_stream', (data) => {
                if (data && data.image) {
                    streamImg.src = data.image; // Base64 görüntüyü doğrudan ekrana bas
                }
            });

            wrapper.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>

</html>
